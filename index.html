<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leha Control</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="status-row">
        <div class="stat-card">
            <span id="cpu" class="stat-val">--%</span>
            <span class="stat-label">CPU</span>
        </div>
        <div class="stat-card">
            <span id="ram" class="stat-val">--%</span>
            <span class="stat-label">RAM</span>
        </div>
    </div>

    <button class="btn" onclick="sendCommand('screenshot')">📸 Скриншот</button>
    <button class="btn" onclick="toggleTasks()">🖥 Диспетчер задач</button>
    <button class="btn btn-secondary" onclick="tg.close()">🚪 Выход</button>

    <div id="tasksBlock">
        <h3 style="margin-top:0">Процессы</h3>
        <div id="taskList">Ожидание данных от Лёхи...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const DB_URL = "https://pc-console-e6ed8-default-rtdb.firebaseio.com/.json";
        let tasksVisible = false;

        function sendCommand(cmd, target = "") {
            fetch(DB_URL, {
                method: 'PATCH',
                body: JSON.stringify({ command: cmd, target: target })
            });
        }

        function toggleTasks() {
            tasksVisible = !tasksVisible;
            document.getElementById('tasksBlock').style.display = tasksVisible ? 'block' : 'none';
            if(tasksVisible) sendCommand('get_tasks');
        }

        setInterval(() => {
            fetch(DB_URL).then(r => r.json()).then(data => {
                if (!data) return;
                document.getElementById('cpu').innerText = (data.cpu || 0) + "%";
                document.getElementById('ram').innerText = (data.ram || 0) + "%";

                if(data.procs && tasksVisible) {
                    let html = '';
                    // Приложения
                    if(data.procs.apps) {
                        data.procs.apps.forEach(p => {
                            html += `<div class="proc-item">
                                <div class="proc-info"><b>${p.name}</b><span>CPU: ${p.cpu}% | RAM: ${p.mem}%</span></div>
                                <button class="kill-btn" onclick="sendCommand('kill', '${p.name}')">❌</button>
                            </div>`;
                        });
                    }
                    document.getElementById('taskList').innerHTML = html || 'Нет данных';
                }
            });
        }, 2000);
    </script>
</body>
</html>
