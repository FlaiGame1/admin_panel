<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Лёха-Контроль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f10;
            --card: #1c1c1e;
            --accent: #2481cc;
            --danger: #ff453a;
            --success: #32d74b;
            --warning: #ff9f0a;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            user-select: none;
            overflow-x: hidden;
        }

        /* Шапка с CPU/RAM */
        .status-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-val {
            font-size: 24px;
            font-weight: 800;
            color: var(--success);
            display: block;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 5px;
        }

        /* Кнопки управления */
        .main-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .main-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Окно диспетчера и скрина */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            font-size: 32px;
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Списки процессов */
        h4 { margin: 20px 0 10px 0; font-size: 14px; opacity: 0.6; text-transform: uppercase; }
        
        .proc-item {
            background: var(--card);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .proc-info div:first-child { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
        .proc-info div:last-child { font-size: 12px; opacity: 0.6; }

        .kill-x {
            background: rgba(255, 69, 58, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
        }

        #screenImg { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
    </style>
</
